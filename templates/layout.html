<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzeria IDGS | Examen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body class="min-h-screen font-sans antialiased text-slate-900 relative overflow-x-hidden"
      style="background: linear-gradient(145deg, #fdeff2 0%, #fff5e9 50%, #f0f2e9 100%);">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 -left-10 w-96 h-96 rounded-full bg-pink-100/40 blur-3xl"></div>
        <div class="absolute bottom-40 -right-10 w-[30rem] h-[30rem] rounded-full bg-amber-100/40 blur-3xl"></div>
        <div class="absolute top-1/3 left-1/4 w-80 h-80 rounded-full bg-blue-100/30 blur-3xl"></div>
        <div class="absolute bottom-20 left-20 w-72 h-72 rounded-full bg-purple-100/30 blur-3xl"></div>
        
        <div class="absolute inset-0 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:32px_32px] opacity-20"></div>
    </div>
    <div class="relative z-10">
        <nav class="bg-white/30 backdrop-blur-md border-b border-white/20 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
                <a href="/" class="flex items-center gap-3">
                    <div class="bg-white/80 p-1.5 rounded-lg shadow-sm">
                        <img src="{{url_for('static',filename='img/Logo pizza.jpg')}}" class="h-7 w-auto" alt="Logo">
                    </div>
                    <span class="text-lg font-bold text-slate-800 tracking-tight italic">FLASK-PIZZERÍA</span>
                </a>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 py-8 flex flex-col items-center">
            <div class="w-full bg-white/70 backdrop-blur-sm rounded-[2rem] shadow-2xl border border-white/50 overflow-hidden">
                <div class="p-6 md:p-10">
                    {% block container %}
                    {% endblock %}
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
